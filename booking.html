<section style="text-align:center; padding:40px; background:#f8f8f8;">
  <h2>Book Appointment 💇‍♀️</h2>

  <form name="booking" method="POST" data-netlify="true" action="/success.html">
    
    <!-- Netlify Hidden Input -->
    <input type="hidden" name="form-name" value="booking">

    <input type="text" name="name" placeholder="Your Name" required 
    style="padding:10px; margin:10px; width:80%;"><br>

    <input type="tel" name="phone" placeholder="Phone Number" required 
    style="padding:10px; margin:10px; width:80%;"><br>

    <input type="date" name="date" required 
    style="padding:10px; margin:10px; width:80%;"><br>

    <select name="service" required 
    style="padding:10px; margin:10px; width:80%;">
      <option value="">Select Service</option>
      <option>Keratin Treatment - ₹2699</option>
      <option>Smoothening - ₹2299</option>
      <option>Botox Treatment - ₹2899</option>
      <option>Nanoplastia - ₹3099</option>
      <option>Korean Facial</option>
    </select><br>

    <button type="submit" 
    style="padding:12px 25px; background:black; color:white; border:none;">
      Book Now
    </button>

  </form>
</section>
